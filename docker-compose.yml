services:
  wiki:
    build:
      context: /home/dev/lgensol-wiki/server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - /home/dev/lgensol-wiki/wiki:/wiki:ro
      - /home/dev/lgensol-wiki/raw/ko:/raw/ko:ro
      - /home/dev/lgensol-wiki/server/.env:/app/.env:ro
      - ~/.hermes/.env:/app/hermes.env:ro
    environment:
      - OLLAMA_MODEL=deepseek-v4-flash:cloud
      - RAW_DIR=/raw/ko
    restart: unless-stopped
